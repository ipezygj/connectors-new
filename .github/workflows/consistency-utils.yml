name: consistency-utils

on:
  push:
    branches: [main, master, development]
    paths:
      - "connector/derivative/backpack_perpetual/**"
  pull_request:
    branches: [main, master, development]
    paths:
      - "connector/derivative/backpack_perpetual/**"
    types: [ready_for_review, opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      payload_desc:
        description: "Sync payload description"
        required: false
        default: "update connector modules"

jobs:
  check_changes:
    name: Check if connector files changed
    outputs:
      is_set: ${{ steps.check_files.outputs.is_set }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.1
      - uses: technote-space/get-diff-action@v6
        if: github.event_name != 'workflow_dispatch'
        with:
          PATTERNS: |
            connector/derivative/backpack_perpetual/**/*.py
      - name: Check modified files
        id: check_files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_set=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ env.GIT_DIFF }}" ]; then
            echo "${{ env.GIT_DIFF }}"
            echo "is_set=true" >> $GITHUB_OUTPUT
          fi

  validate_connector:
    name: Connector validation suite
    needs: check_changes
    if: github.event.pull_request.draft == false && needs.check_changes.outputs.is_set == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install black "isort>=5.12,<6"

      - name: Validate Black formatting
        run: |
          black --check --line-length 120 connector/derivative/backpack_perpetual/ || {
            echo "Black formatting check failed."
            exit 1
          }

      - name: Validate isort import ordering
        run: |
          isort --check-only --profile black --line-length 120 -p hummingbot connector/derivative/backpack_perpetual/ || {
            echo "Import ordering check failed."
            exit 1
          }

      - name: Verify V2.1 Gateway docstrings
        shell: bash
        run: |
          TARGET_DIR="connector/derivative/backpack_perpetual"
          EXPECTED='"""Technical implementation for Hummingbot Gateway V2.1."""'
          FAILED=0

          for f in $(find "$TARGET_DIR" -name "*.py" -not -name "__init__.py"); do
            FIRST_LINE=$(head -n 1 "$f" | tr -d '\r')
            if [ "$FIRST_LINE" != "$EXPECTED" ]; then
              echo "FAIL: Missing V2.1 docstring in $f"
              echo "  Found:    $FIRST_LINE"
              echo "  Expected: $EXPECTED"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          else
            echo "All .py files contain the required V2.1 Gateway docstring."
          fi

      - name: Verify no restricted keywords
        shell: bash
        run: |
          TARGET_DIR="connector/derivative/backpack_perpetual"
          if grep -r -i -E "(Ferrari|Neural)" "$TARGET_DIR"; then
            echo "FAIL: Restricted keywords detected."
            exit 1
          else
            echo "No restricted keywords found."
          fi

      - name: Report
        run: |
          echo "Payload: ${{ github.event.inputs.payload_desc }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
